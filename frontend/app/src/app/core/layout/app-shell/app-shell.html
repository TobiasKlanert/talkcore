<div class="shell">
  <mat-toolbar class="topbar" role="heading">
    <div class="topbar__left">
      <button
        mat-icon-button
        type="button"
        class="topbar__button standard-button"
        aria-label="Menü anzeigen oder verbergen"
        [class.sidenav__toggle--active]="sidenavOpen()"
        (click)="sidenav.toggle()"
      >
        <mat-icon fontSet="material-symbols-rounded">menu</mat-icon>
      </button>

      <span class="topbar__brand">TalkCore</span>
    </div>

    <div class="topbar__center">
      <mat-form-field appearance="outline" class="topbar__search">
        <mat-icon fontSet="material-symbols-rounded" matPrefix>search</mat-icon>
        <input matInput type="text" placeholder="Suchen" />
      </mat-form-field>
    </div>

    <div class="topbar__right">
      <button
        mat-icon-button
        type="button"
        class="topbar__button standard-button"
        aria-label="Anzeigestil ändern"
        (click)="toggleTheme()"
      >
        @if (this.isDark) {
          <mat-icon fontSet="material-symbols-rounded">light_mode</mat-icon>
        } @else {
          <mat-icon fontSet="material-symbols-rounded">dark_mode</mat-icon>
        }
      </button>
      <button
        matIconButton
        class="topbar__button topbar__menu standard-button"
        [matMenuTriggerFor]="menu"
        aria-label="Example icon-button with a menu"
      >
        <mat-icon fontSet="material-symbols-rounded">account_circle</mat-icon>
      </button>
      <mat-menu #menu="matMenu" class="topbar__menu">
        <button mat-menu-item class="standard-button">
          <mat-icon>account_circle</mat-icon>
          <span>Profil</span>
        </button>

        <button mat-menu-item class="standard-button">
          <mat-icon>settings</mat-icon>
          <span>Einstellungen</span>
        </button>

        <mat-divider class="nav__divider"></mat-divider>

        <button mat-menu-item class="standard-button">
          <mat-icon>info</mat-icon>
          <span>Über TalkCore</span>
        </button>

        <mat-divider class="nav__divider"></mat-divider>

        <button mat-menu-item class="standard-button">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </div>
  </mat-toolbar>

  <mat-sidenav-container class="example-container" [hasBackdrop]="false">
    <mat-sidenav
      #sidenav
      class="sidenav"
      opened="true"
      [mode]="mode.value!"
      (openedStart)="sidenavOpen.set(true)"
      (closedStart)="sidenavOpen.set(false)"
    >
      <div class="nav-container">
        <nav class="nav">
          <a
            class="nav__item standard-button"
            routerLink="/chat"
            routerLinkActive="nav__item--active"
          >
            <mat-icon fontSet="material-symbols-rounded">tag</mat-icon>
            <span class="nav__label">Channels</span>
          </a>

          <a
            class="nav__item standard-button"
            routerLink="/dms"
            routerLinkActive="nav__item--active"
          >
            <mat-icon fontSet="material-symbols-rounded">chat</mat-icon>
            <span class="nav__label">DMs</span>
          </a>

          <a
            class="nav__item standard-button"
            routerLink="/app/new-chat"
            routerLinkActive="nav__item--active"
          >
            <mat-icon fontSet="material-symbols-rounded">edit_square</mat-icon>
            <span class="nav__label">Neuer Chat</span>
          </a>
        </nav>

        <nav class="nav">
          <mat-divider class="nav__divider"></mat-divider>
          <a
            class="nav__item standard-button"
            routerLink="/app/imprint"
            routerLinkActive="nav__item--active"
          >
            <mat-icon fontSet="material-symbols-rounded">description</mat-icon>
            <span class="nav__label">Impressum</span>
          </a>

          <a
            class="nav__item standard-button"
            routerLink="/app/privacy"
            routerLinkActive="nav__item--active"
          >
            <mat-icon fontSet="material-symbols-rounded">policy</mat-icon>
            <span class="nav__label">Datenschutz</span>
          </a>
        </nav>
      </div>
    </mat-sidenav>

    <mat-sidenav-content>
      <main class="main-content__inner">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
